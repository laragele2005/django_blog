{% extends 'base.html' %}

{% block content %}
{% load crispy_forms_tags %}
  <div class="row">
    <!-- Load Dashboard left sidebar -->
    {% include 'dashboard/sidebar.html' %}

    <div class="col-md-9">
      {% if perms.auth.edit_user %}
      <h2>Edit User</h2>
      <form action="{% url 'add_user' %}" method="POST" >
        {% csrf_token %}
        {{form | crispy}}

        <button type="submit" class="btn btn-warning">Submit</button>
      </form>
      {%else%}
        <h5>You do not have permission to be in this page.</h5>
      {% endif %}
    </div>

    <!-- Dashboard right sidebar -->
  </div>
{% endblock %}
